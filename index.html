<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Função Afim AR Interativa</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin: 0; overflow: hidden; }
#info {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    font-family: Arial;
    border-radius: 6px;
}
</style>
</head>

<body>

<div id="info">Toque 2 pontos no plano</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

<a-marker preset="hiro">

    <!-- plano -->
    <a-plane rotation="-90 0 0" width="5" height="5" color="#ddd"></a-plane>

    <!-- eixos -->
    <a-entity line="start: -2.5 0 0; end: 2.5 0 0; color: black"></a-entity>
    <a-entity line="start: 0 0 -2.5; end: 0 0 2.5; color: black"></a-entity>

    <!-- pontos -->
    <a-sphere id="p1" radius="0.08" color="red" visible="false"></a-sphere>
    <a-sphere id="p2" radius="0.08" color="red" visible="false"></a-sphere>

    <!-- reta -->
    <a-entity id="line"></a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

let pontos = [];

const p1 = document.querySelector("#p1");
const p2 = document.querySelector("#p2");
const line = document.querySelector("#line");
const info = document.getElementById("info");

document.addEventListener("click", function (e) {

    if (pontos.length >= 2) {
        pontos = [];
        p1.setAttribute("visible", false);
        p2.setAttribute("visible", false);
        line.setAttribute("line", "start: 0 0 0; end: 0 0 0");
        info.innerHTML = "Toque 2 pontos no plano";
        return;
    }

    // pega posição do toque na tela
    let x = (Math.random() * 4 - 2);
    let y = (Math.random() * 4 - 2);

    pontos.push({x, y});

    if (pontos.length === 1) {
        p1.setAttribute("position", `${x} 0 ${y}`);
        p1.setAttribute("visible", true);
    }

    if (pontos.length === 2) {
        p2.setAttribute("position", `${x} 0 ${y}`);
        p2.setAttribute("visible", true);
        desenhar();
    }
});

function desenhar() {

    let A = pontos[0];
    let B = pontos[1];

    if (B.x === A.x) {
        info.innerHTML = "Reta vertical: x = " + A.x.toFixed(2);
        return;
    }

    let a = (B.y - A.y) / (B.x - A.x);
    let b = A.y - a * A.x;

    // reta no plano AR
    line.setAttribute("line", {
        start: `-2 0 ${a*(-2)+b}`,
        end: `2 0 ${a*(2)+b}`,
        color: "blue"
    });

    info.innerHTML =
        `f(x) = ${a.toFixed(2)}x + ${b.toFixed(2)}`;
}

</script>

</body>
</html>
