<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Função Afim AR (corrigido)</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body { margin: 0; overflow: hidden; }
#info {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: white;
  padding: 8px;
  font-family: Arial;
  z-index: 10;
}
</style>
</head>

<body>

<div id="info">Toque no plano (hiro marker)</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-marker preset="hiro">

    <!-- plano -->
    <a-plane rotation="-90 0 0" width="5" height="5" color="#eee"></a-plane>

    <!-- eixos -->
    <a-entity line="start: -2.5 0 0; end: 2.5 0 0; color: black"></a-entity>
    <a-entity line="start: 0 0 -2.5; end: 0 0 2.5; color: black"></a-entity>

    <!-- pontos -->
    <a-sphere id="p1" radius="0.08" color="red" visible="false"></a-sphere>
    <a-sphere id="p2" radius="0.08" color="red" visible="false"></a-sphere>

    <!-- reta -->
    <a-entity id="reta"></a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>

let pontos = [];

const p1 = document.querySelector("#p1");
const p2 = document.querySelector("#p2");
const reta = document.querySelector("#reta");
const info = document.getElementById("info");

document.addEventListener("click", (event) => {

    if (pontos.length >= 2) {
        pontos = [];
        p1.setAttribute("visible", false);
        p2.setAttribute("visible", false);
        reta.setAttribute("line", "start: 0 0 0; end: 0 0 0");
        info.innerHTML = "Toque no plano (hiro)";
        return;
    }

    // coordenadas simuladas no plano AR (-2 a 2)
    const x = (Math.random() * 4 - 2);
    const y = (Math.random() * 4 - 2);

    pontos.push({x, y});

    if (pontos.length === 1) {
        p1.setAttribute("position", `${x} 0 ${y}`);
        p1.setAttribute("visible", true);
    }

    if (pontos.length === 2) {
        p2.setAttribute("position", `${x} 0 ${y}`);
        p2.setAttribute("visible", true);
        desenhar();
    }
});

function desenhar() {

    const A = pontos[0];
    const B = pontos[1];

    const a = (B.y - A.y) / (B.x - A.x);
    const b = A.y - a * A.x;

    reta.setAttribute("line", {
        start: `-2 0 ${a * (-2) + b}`,
        end: `2 0 ${a * (2) + b}`,
        color: "blue"
    });

    info.innerHTML = `f(x) = ${a.toFixed(2)}x + ${b.toFixed(2)}`;
}

</script>

</body>
</html>
